name: Gerar Executável
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: |
          pip install pypdf "selenium>=4.10.0" pyperclip pyinstaller pdfplumber webdriver-manager

      # Baixa o chromedriver compatível com a versão do Chrome instalada
      # no runner windows-latest e o copia para a pasta do projeto
      - name: Baixar chromedriver
        run: |
          python -c "
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          import shutil
          path = ChromeDriverManager().install()
          shutil.copy(path, 'chromedriver.exe')
          print('chromedriver copiado para:', 'chromedriver.exe')
          "

      - name: Gerar o .exe limpo e independente
        run: >
          pyinstaller
          --onefile
          --noconsole
          --name "RoboFiscalizacao"
          --collect-all selenium
          --collect-all pdfplumber
          --add-binary "chromedriver.exe;."
          robo_brave-v1.py

      - name: Disponibilizar o .exe para download
        uses: actions/upload-artifact@v4
        with:
          name: RoboFiscalizacao
          path: dist/RoboFiscalizacao.exe
