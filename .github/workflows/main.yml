name: Gerar Executável

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: |
          pip install pypdf selenium>=4.10.0 pyperclip pyinstaller pdfplumber

      # Detecta a versão do Edge instalado no runner (evita descompasso quando o Edge atualiza)
      - name: Detectar versão do Edge instalado
        shell: pwsh
        run: |
          $edgePath = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          $edgeVersion = (Get-Item $edgePath).VersionInfo.ProductVersion
          Write-Host "Versão do Edge detectada: $edgeVersion"
          echo "EDGE_VERSION=$edgeVersion" >> $env:GITHUB_ENV

      # Baixar o EdgeDriver na mesma versão do Edge detectado
      - name: Baixar o EdgeDriver
        shell: pwsh
        run: |
          $url = "https://msedgedriver.microsoft.com/$env:EDGE_VERSION/edgedriver_win64.zip"
          Invoke-WebRequest -Uri $url -OutFile edgedriver.zip
          Expand-Archive -Path edgedriver.zip -DestinationPath . -Force

      - name: Gerar o .exe limpo e independente
        run: |
          pyinstaller --onefile --noconsole --name "RoboFiscalizacao" --collect-all selenium --collect-all pdfplumber --add-data "msedgedriver.exe;." robo_brave-v1.py

      - name: Disponibilizar o .exe para download
        uses: actions/upload-artifact@v4
        with:
          name: RoboFiscalizacao
          path: dist/RoboFiscalizacao.exe
